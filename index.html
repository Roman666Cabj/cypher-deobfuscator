<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cypher Deobfuscator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    textarea { font-family: ui-monospace, 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 14px; line-height: 1.4; }
    body { background: linear-gradient(to bottom, #0f0f17, #000000); }
  </style>
</head>
<body class="text-gray-200 min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-2 text-violet-400">Cypher Deobfuscator</h1>
    <p class="text-center text-gray-400 mb-8">WeAreDevs • Prometheus • LuaObfuscator • String Encryption & VM cleanup (2026)</p>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Input -->
      <div>
        <div class="flex justify-between mb-2 items-center">
          <h2 class="font-semibold text-lg">Código Obfuscado</h2>
          <button onclick="detectType()" class="text-xs bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-md border border-gray-600">🔍 Detectar tipo</button>
        </div>
        <textarea id="input" class="w-full h-96 bg-gray-900/80 border border-gray-700 rounded-xl p-4 resize-none focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500" placeholder="Pega aquí tu script Lua obfuscado..."></textarea>
      </div>

      <!-- Output -->
      <div>
        <div class="flex justify-between mb-2 items-center">
          <h2 class="font-semibold text-lg">Resultado Deobfuscado</h2>
          <div class="flex gap-2">
            <button onclick="copyOutput()" class="text-xs bg-emerald-700 hover:bg-emerald-600 px-4 py-1.5 rounded-md">📋 Copiar</button>
            <button onclick="sendToGrok()" class="text-xs bg-indigo-700 hover:bg-indigo-600 px-4 py-1.5 rounded-md">🤖 Enviar a Grok</button>
          </div>
        </div>
        <textarea id="output" readonly class="w-full h-96 bg-gray-900/80 border border-gray-700 rounded-xl p-4 resize-none"></textarea>
      </div>
    </div>

    <div class="flex flex-wrap gap-4 justify-center mt-10">
      <button onclick="deobfAll()" class="bg-violet-600 hover:bg-violet-500 px-10 py-4 rounded-xl font-bold text-lg shadow-lg shadow-violet-900/30">🚀 Deobf Automático</button>
      <button onclick="deobfLuaObfuscator()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-xl font-medium">LuaObfuscator</button>
      <button onclick="deobfPrometheus()" class="bg-rose-600 hover:bg-rose-500 px-8 py-4 rounded-xl font-medium">Prometheus / WeAreDevs</button>
      <button onclick="beautify()" class="bg-amber-600 hover:bg-amber-500 px-8 py-4 rounded-xl font-medium">Beautify</button>
      <button onclick="clearAll()" class="bg-gray-700 hover:bg-gray-600 px-8 py-4 rounded-xl font-medium">Limpiar todo</button>
    </div>

    <div id="status" class="mt-8 text-center text-lg font-mono"></div>
  </div>

  <script>
    function setStatus(msg, color = "emerald") {
      const el = document.getElementById("status");
      el.innerHTML = `<span class="text-\( {color}-400 font-semibold"> \){msg}</span>`;
      setTimeout(() => el.innerHTML = "", 5000);
    }

    function detectType() {
      const code = document.getElementById("input").value.trim();
      if (!code) return setStatus("Nada para detectar", "gray");
      
      let type = "Desconocido / Custom";
      if (/WeAreDevs|Prometheus|PHASE_BOUNDARY|anti-debug|debug\.getinfo/i.test(code)) type = "Prometheus / WeAreDevs";
      else if (/LuaObfuscator|loadstring.*gsub|string\.char.*table\.unpack/i.test(code)) type = "LuaObfuscator (strings/char)";
      else if (/IronBrew|IB2|MoonSec/i.test(code)) type = "Posible IronBrew / MoonSec";
      
      setStatus(`Tipo detectado: ${type}`, "violet");
    }

    function beautify(inputCode = null) {
      let code = inputCode || (document.getElementById("output").value || document.getElementById("input").value);
      if (!code.trim()) return setStatus("Nada para beautify", "gray");

      // Simple indentador (no perfecto, pero útil para la mayoría)
      let indentLevel = 0;
      const lines = code.split('\n').map(line => {
        line = line.trim();
        if (!line) return '';
        
        if (/^end\b|^else\b|^elseif\b|^\}/.test(line)) indentLevel = Math.max(0, indentLevel - 1);
        
        const indented = '  '.repeat(indentLevel) + line;
        
        if (/^(function|if|for|while|repeat|do|then|local\s+function)\b/.test(line) || line.endsWith('{') || line.endsWith('do')) {
          indentLevel++;
        }
        return indented;
      }).filter(Boolean);

      const result = lines.join('\n');
      document.getElementById("output").value = result;
      setStatus("Beautify aplicado ✓", "amber");
      return result;
    }

    function deobfLuaObfuscator() {
      let code = document.getElementById("input").value;
      if (!code) return setStatus("Pega código primero", "red");

      // string.char + table.unpack({n,n,n})
      code = code.replace(/string\.char\s*\(\s*table\.unpack\s*\(\s*\{([\d\s,]+)\}\s*\)\s*\)/g, (_, nums) => {
        const chars = nums.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        return JSON.stringify(String.fromCharCode(...chars));
      });

      // string.char(97,98,99)
      code = code.replace(/string\.char\s*\(\s*(\d+(?:\s*,\s*\d+)*)\s*\)/g, (_, nums) => {
        const chars = nums.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        return JSON.stringify(String.fromCharCode(...chars));
      });

      // gsub XOR pattern común
      code = code.replace(/:gsub\(["']([^"']+)["'],\s*function\s*\(\w\)\s*return\s*string\.char\(\w:byte\(\)\s*\^\s*(\d+)\)\s*end\)/g, (_, str, xorKey) => {
        const k = parseInt(xorKey);
        const decrypted = str.split('').map(c => String.fromCharCode(c.charCodeAt(0) ^ k)).join('');
        return JSON.stringify(decrypted);
      });

      document.getElementById("output").value = code;
      beautify();
      setStatus("LuaObfuscator strings desencriptadas ✓", "blue");
    }

    function deobfPrometheus() {
      let code = document.getElementById("input").value;
      if (!code) return setStatus("Pega código primero", "red");

      // Remover phase boundaries, anti-debug, wrappers comunes
      code = code.replace(/--\s*PHASE_BOUNDARY[^\n]*\n?/g, '');
      code = code.replace(/if\s+(getfenv|debug\.getinfo|synapse|krnl|isexecutor|identifyexecutor)[^\n]*\n?/g, '-- [ANTI-DEBUG REMOVIDO]\n');
      code = code.replace(/\(\s*\[\[This file was protected with .+?\]\]\s*\)\s*:\s*gsub\s*\(.+?function.+?end\s*\)\s*;?/gs, '-- [PROMETHEUS WRAPPER REMOVIDO]');
      code = code.replace(/local\s+\w+\s*=\s*loadstring\s*\(\s*game\s*:\s*HttpGet\s*\(\s*["'].+?["']\s*\)\s*\)/g, '-- [HTTP LOADER DETECTADO - REVISAR]');

      document.getElementById("output").value = code;
      beautify();
      setStatus("Prometheus / WeAreDevs limpiado ✓ (próximo paso: trace/dump)", "rose");
    }

    function deobfAll() {
      const code = document.getElementById("input").value.trim();
      if (!code) return setStatus("Ingresa un script primero", "red");

      let processed = code;

      // Auto-detect y aplicar
      if (/LuaObfuscator|string\.char|table\.unpack/.test(code)) {
        deobfLuaObfuscator();
      } else {
        deobfPrometheus();
      }

      // Beautify final
      beautify();
      setStatus("Deobfuscación automática completada 🔥", "violet");
    }

    function copyOutput() {
      const out = document.getElementById("output");
      if (!out.value.trim()) return setStatus("Nada para copiar", "gray");
      out.select();
      document.execCommand("copy");
      setStatus("Copiado al portapapeles ✓", "emerald");
    }

    function sendToGrok() {
      const output = document.getElementById("output").value.trim();
      if (!output) return setStatus("No hay resultado para enviar", "red");

      const MAX_CHARS = 7500;
      let codeToSend = output;
      if (codeToSend.length > MAX_CHARS) {
        codeToSend = codeToSend.substring(0, MAX_CHARS) + "\n\n-- [Código truncado por longitud - pega el resto manualmente]";
      }

      const prompt = `Aquí tienes un script Lua que ya pasé por deobfuscador básico (strings desencriptadas, anti-debug removido, beautify aplicado). 
Aún puede tener variables confusas, control flow flattening, junk code o partes de VM no resueltas.

Por favor, analízalo y haz lo siguiente:
1. Renombra variables y funciones a nombres significativos (usa contexto de Roblox/exploits si aplica)
2. Elimina código muerto / junk
3. Reconstruye el flujo lógico si está flattened
4. Comenta secciones importantes
5. Si es VM-based (Prometheus/MoonSec), intenta aproximar la lógica original lo mejor posible
6. Devuélveme la versión limpia y legible

Script:
\`\`\`lua
${codeToSend}
\`\`\`

Gracias!`;

      const encoded = encodeURIComponent(prompt);
      const grokUrl = `https://grok.x.ai/?q=${encoded}`;

      window.open(grokUrl, '_blank');
      setStatus("Abriendo Grok con prompt perfecto... ✓", "indigo");
    }

    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("output").value = "";
      setStatus("Todo limpio", "gray");
    }

    // Atajo: Ctrl + Enter → Deobf automático
    document.addEventListener("keydown", e => {
      if (e.ctrlKey && e.key === "Enter") deobfAll();
    });
  </script>
</body>
</html>
