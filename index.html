<!DOCTYPE html>

    body { background: linear-gradient(to bottom, #0f0f17, #000000); }

<body class="text-gray-200 min-h-screen p-6">

      </div>

      <div>

            <button onclick="sendToGrok()" class="text-xs bg-indigo-700 hover:bg-indigo-600 px-4 py-1.5 rounded-md">🤖 Enviar a Grok</button>
          </div>
        </div>
        <pre><code id="output-highlight" class="language-lua h-96 overflow-auto bg-gray-900/80 border border-gray-700 rounded-xl p-4"></code></pre>
        <textarea id="output" class="hidden w-full h-96 bg-transparent border-0 resize-none focus:outline-none" readonly></textarea>
      </div>
    </div>

    <div class="flex flex-wrap gap-4 justify-center mt-10">
      <button onclick="deobfAll()" class="bg-violet-600 hover:bg-violet-500 px-10 py-4 rounded-xl font-bold text-lg shadow-lg shadow-violet-900/30">🚀 Deobf Automático</button>
      <button onclick="prepareWithEnvLogger()" class="bg-emerald-600 hover:bg-emerald-500 px-8 py-4 rounded-xl font-medium flex items-center gap-2">🔧 Preparar con Env Logger</button>
      <button onclick="deobfLuaObfuscator()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-xl font-medium">LuaObfuscator</button>
      <button onclick="deobfPrometheus()" class="bg-rose-600 hover:bg-rose-500 px-8 py-4 rounded-xl font-medium">Prometheus / WeAreDevs</button>
      <button onclick="beautify()" class="bg-amber-600 hover:bg-amber-500 px-8 py-4 rounded-xl font-medium">Beautify Mejorado</button>
      <button onclick="clearAll()" class="bg-gray-700 hover:bg-gray-600 px-8 py-4 rounded-xl font-medium">Limpiar</button>
    </div>

    <div id="status" class="mt-8 text-center text-lg font-mono"></div>

    <div class="mt-12 text-center text-sm text-gray-500 max-w-3xl mx-auto">
      Flujo recomendado: Pega script → Preparar con Env Logger → Ejecuta en exploit → Pega logged.txt → Beautify → Descargar o Enviar a Grok
    </div>
  </div>

  <script>
    // Inicializar highlight.js
    hljs.highlightAll();

    function updateHighlight(id, content) {
      const el = document.getElementById(id);
      el.textContent = content;
      hljs.highlightElement(el);
    }

    function syncTextareas() {
      document.getElementById('input').value = document.getElementById('input-highlight').textContent;
      document.getElementById('output').value = document.getElementById('output-highlight').textContent;
    }

    function setStatus(msg, color = "emerald") {
      document.getElementById("status").innerHTML = `<span class="text-\( {color}-400 font-semibold"> \){msg}</span>`;
      setTimeout(() => document.getElementById("status").innerHTML = "", 5000);
    }

    function beautify() {
      syncTextareas();
      let code = document.getElementById("output").value || document.getElementById("input").value;
      if (!code.trim()) return setStatus("Nada para beautify", "gray");

      // Beautifier mejorado para Lua
      let lines = code.split('\n');
      let indentLevel = 0;
      let result = [];

      lines.forEach(line => {
        let trimmed = line.trim();
        if (!trimmed) {
          result.push('');
          return;
        }

        // Decrementar indent antes de procesar
        if (/^end\b|^else\b|^elseif\b|^until\b|^\}/.test(trimmed) || trimmed.startsWith(')')) {
          indentLevel = Math.max(0, indentLevel - 1);
        }

        // Agregar indent
        let indented = '  '.repeat(indentLevel) + trimmed;

        // Incrementar indent después
        if (/^(local\s+)?function\b|if\b|for\b|while\b|repeat\b|then\b|else\b|elseif\b|do\b|\{$/.test(trimmed) ||
            trimmed.endsWith('do') || trimmed.endsWith('{') || trimmed.endsWith('then')) {
          indentLevel++;
        }

        // Manejo especial para comentarios multilínea
        if (trimmed.startsWith('--[[')) indentLevel++;
        if (trimmed.endsWith(']]')) indentLevel = Math.max(0, indentLevel - 1);

        result.push(indented);
      });

      const beautified = result.join('\n');
      document.getElementById("output").value = beautified;
      updateHighlight("output-highlight", beautified);
      setStatus("Beautify mejorado aplicado ✓ (mejor indentación Lua)", "amber");
    }

    function downloadOutput() {
      syncTextareas();
      const content = document.getElementById("output").value.trim();
      if (!content) return setStatus("Nada para descargar", "red");

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'deobfuscated.lua';  // o cambia a 'deobfuscated.txt' si preferís
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setStatus("Archivo .lua descargado ✓", "emerald");
    }

    // ... (el resto de funciones se mantienen iguales: prepareWithEnvLogger, deobfAll, detectType, etc.)
    // Solo asegúrate de llamar updateHighlight después de cada cambio importante en output/input

    }

    function deobfLuaObfuscator() {
      // ... (código anterior)
      // Al final:
      updateHighlight("output-highlight", code);
    }

    // Lo mismo para otras funciones que modifiquen output

    // Listener para cambios en input (si querés edición directa en highlight)
    document.getElementById('input-highlight').addEventListener('input', () => {
      syncTextareas();
    });

    // Inicial
    hljs.initHighlightingOnLoad();
  </script>
