local function tblformat(tbl, depth)
 local depth = depth or 0

 local first = true

    function setStatus(msg, color = "violet") {
      document.getElementById("status").innerHTML =
        `<span class="text-\( {color}-300 font-semibold"> \){msg}</span>`;
      setTimeout(() => (document.getElementById("status").innerHTML = ""), 5000);
    }

    function beautify() {
      let code = document.getElementById("output").value || document.getElementById("input").value;
      if (!code.trim()) return setStatus("Nada para beautify", "gray");

      let lines = code.split('\n');
      let indentLevel = 0;
      let result = [];

      lines.forEach(line => {
        let trimmed = line.trim();
        if (!trimmed) {
          result.push('');
          return;
        }

        if (/^end\\b|^else\\b|^elseif\\b|^until\\b|^\\}|^\\)/.test(trimmed)) {
          indentLevel = Math.max(0, indentLevel - 1);
        }

        let indented = '  '.repeat(indentLevel) + trimmed;

        if (/^(local\\s+)?function\\b|if\\b|for\\b|while\\b|repeat\\b|then\\b|else\\b|elseif\\b|do\\b|\\{$/.test(trimmed) ||
            trimmed.endsWith('do') || trimmed.endsWith('{') || trimmed.endsWith('then')) {
          indentLevel++;
        }

        if (trimmed.startsWith('--[[')) indentLevel++;
        if (trimmed.endsWith(']]')) indentLevel = Math.max(0, indentLevel - 1);

        result.push(indented);
      });

      const beautified = result.join('\n');
      document.getElementById("output").value = beautified;
      setStatus("Beautify mejorado aplicado ✓", "amber");
    }

    function downloadOutput() {
      const content = document.getElementById("output").value.trim();
      if (!content) return setStatus("Nada para descargar", "red");

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'deobfuscated.lua';
      a.click();
      URL.revokeObjectURL(url);
      setStatus("Archivo .lua descargado ✓", "emerald");
    }

    }

    function detectType() {
      const code = document.getElementById("input").value.trim();
      if (!code) return setStatus("Nada para detectar", "gray");
      let type = "Custom / Desconocido";
      if (/WeAreDevs|Prometheus|PHASE_BOUNDARY/i.test(code)) type = "Prometheus / WeAreDevs";
      else if (/LuaObfuscator|string\\.char|table\\.unpack/i.test(code)) type = "LuaObfuscator";
      setStatus(`Detectado: ${type}`, "violet");
    }

    function deobfLuaObfuscator() {
      let code = document.getElementById("input").value;
      if (!code) return setStatus("Nada para procesar", "red");

      code = code.replace(/string\\.char\s*\(\s*table\.unpack\s*\(\s*\{([\d\s,]+)\}\s*\)\s*\)/g, (_, n) => JSON.stringify(String.fromCharCode(...n.split(',').map(Number))));
      code = code.replace(/string\\.char\s*\(\s*(\d+(?:,\s*\d+)*)\s*\)/g, (_, n) => JSON.stringify(String.fromCharCode(...n.split(',').map(Number))));

      document.getElementById("output").value = code;
      beautify();
      setStatus("LuaObfuscator strings desencriptadas ✓", "blue");
    }

    function deobfPrometheus() {
      let code = document.getElementById("input").value;
      if (!code) return setStatus("Nada para procesar", "red");

      code = code.replace(/--\s*PHASE_BOUNDARY[^\n]*\n?/g, '');
      code = code.replace(/if\s+(getfenv|debug\.getinfo|synapse|krnl|identifyexecutor)[^\n]*\n?/g, '-- [ANTI-DEBUG REMOVIDO]\n');

      document.getElementById("output").value = code;
      beautify();
      setStatus("Prometheus/WeAreDevs limpieza básica ✓", "rose");
    }

      const url = `https://grok.x.ai/?q=${encodeURIComponent(prompt)}`;
      window.open(url, '_blank');
      setStatus(`Abriendo Grok ${isLog ? '(modo ENV LOG)' : ''} ✓`, "indigo");
    }

    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("output").value = "";
      setStatus("Limpio", "gray");
    }

    // Importar archivo
    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      const MAX_MB = 5;
      if (file.size > MAX_MB * 1024 * 1024) {
        setStatus(`Archivo muy grande (máx ${MAX_MB}MB)`, "red");
        e.target.value = "";
        return;
      }

      try {
        const text = await file.text();
        document.getElementById("input").value = text;
        setStatus(`Importado: ${file.name} ✓`, "violet");
      } catch (err) {
        setStatus("No se pudo leer el archivo", "red");
      } finally {
        e.target.value = "";
      }
    });
  </script>
</body>
</html>
