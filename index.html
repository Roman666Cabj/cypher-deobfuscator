<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cypher WebHook Tool</title>

<style>

body{
background:#05040a;
color:white;
font-family:Arial;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.panel{

width:95%;
max-width:420px;
background:#0b0914;
border:1px solid #6b39ff;
border-radius:14px;
padding:20px;
box-shadow:0 0 30px #5e2eff;
text-align:center;

}

h1{
color:#cba6ff;
margin-bottom:20px;
}

input,textarea{

width:100%;
padding:10px;
margin-top:10px;
background:#070610;
border:1px solid #5a2ad9;
color:white;
border-radius:6px;

}

button{

width:100%;
padding:10px;
margin-top:10px;
background:#7a42ff;
border:none;
color:white;
border-radius:6px;
font-weight:bold;

}

button:hover{

background:#9a6dff;

}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}

.info{

margin-top:15px;
padding:10px;
background:#06050b;
border:1px solid #4a2aa6;
border-radius:6px;
font-size:13px;

}

.avatar{

width:70px;
height:70px;
border-radius:50%;
margin-bottom:10px;

}

.log{

margin-top:10px;
height:100px;
overflow:auto;
background:#030207;
border:1px solid #4a2aa6;
padding:6px;

}

</style>
</head>

<body>

<div class="panel">

<h1>Cypher WebHook Tool</h1>

<div id="login">

<input id="webhook" placeholder="Enter WebHook URL">
<button onclick="loadWebhook()">Load WebHook</button>

</div>

<div id="tool" style="display:none">

<img id="avatar" class="avatar">

<div class="info" id="info"></div>

<textarea id="message" placeholder="Message"></textarea>

<div class="grid">

<button onclick="send()">Send</button>
<button onclick="spam()">Spam</button>

<button onclick="deleteWebhook()">Delete</button>
<button onclick="changeName()">Change Name</button>

<button onclick="changeAvatar()">Avatar</button>
<button onclick="check()">Check</button>

</div>

<button onclick="stopSpam()">Stop Spam</button>

<div class="log" id="log"></div>

</div>

</div>

<script>

let webhook = ""
let spamLoop = null

function log(t){

document.getElementById("log").innerHTML += t+"<br>"

}

async function loadWebhook(){

webhook = document.getElementById("webhook").value

let r = await fetch(webhook)

if(r.status !== 200){

alert("Webhook invalid")
return

}

let data = await r.json()

document.getElementById("login").style.display="none"
document.getElementById("tool").style.display="block"

document.getElementById("avatar").src =
"https://cdn.discordapp.com/avatars/"+data.id+"/"+data.avatar+".png"

document.getElementById("info").innerHTML =

"Name: "+data.name+"<br>"+
"Webhook ID: "+data.id+"<br>"+
"Channel ID: "+data.channel_id

}

async function send(){

let m = document.getElementById("message").value

let r = await fetch(webhook,{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content:m})

})

if(r.status==204) log("Message sent")

}

function spam(){

let count = prompt("How many messages?")

let m = document.getElementById("message").value

let sent = 0

spamLoop = setInterval(async()=>{

if(sent>=count){

clearInterval(spamLoop)
log("Spam finished")
return

}

let r = await fetch(webhook,{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content:m})

})

if(r.status==204){

sent++
log("Sent "+sent)

}

},700)

}

function stopSpam(){

clearInterval(spamLoop)
log("Spam stopped")

}

async function deleteWebhook(){

if(!confirm("Delete webhook?")) return

let r = await fetch(webhook,{method:"DELETE"})

if(r.status==204){

log("Webhook deleted")

}

}

async function changeName(){

let name = prompt("New name")

if(!name) return

let r = await fetch(webhook,{

method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name})

})

if(r.status==200) log("Name changed")

}

async function changeAvatar(){

let url = prompt("Avatar Image URL")

if(!url) return

let base64 = await fetch(url).then(r=>r.blob()).then(blob=>{

return new Promise(resolve=>{

let reader = new FileReader()
reader.onload = ()=>resolve(reader.result)
reader.readAsDataURL(blob)

})

})

let r = await fetch(webhook,{

method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({avatar:base64})

})

if(r.status==200) log("Avatar changed")

}

async function check(){

let r = await fetch(webhook)

if(r.status==200) log("Webhook active")
else log("Webhook invalid")

}

</script>

</body>
</html>
