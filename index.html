  <script>
    hljs.highlightAll();

    function updateHighlight(id, content) {
      const el = document.getElementById(id);
      el.textContent = content || '';
      hljs.highlightElement(el);
    }

    function syncEditors() {
      document.getElementById('input').value = document.getElementById('input-highlight').textContent;
      document.getElementById('output').value = document.getElementById('output-highlight').textContent;
    }

    function setStatus(msg, color = "violet") {
      document.getElementById("status").innerHTML = `<span class="text-\( {color}-300 font-semibold"> \){msg}</span>`;
      setTimeout(() => document.getElementById("status").innerHTML = "", 6000);
    }

    // ==============================================
    // ENV LOGGER MEJORADO (inspirado en Dumper + V2)
    // ==============================================
    const ENV_LOGGER = `print("[genv logger by Cypher Scripts - Enhanced]")

-- Inicializa el archivo de log con servicios comunes
writefile('logged.txt', [[
-- Cypher Logger - Registro de todas las llamadas API
-- Generado el ]] .. os.date("%Y-%m-%d %H:%M:%S") .. [[

local function isuilib()
    local a = debug.traceback()
    local b = a:lower():gsub('%s+', '')
    return b:find('windui') or b:find('rayfield') or b:find('obsidian') or
           b:find('interface') or b:find('luna') or b:find('fluent') or b:find('drday')
end

local function formatlog(text)
    if type(text) \~= 'string' then
        return tostring(text)  -- fallback seguro si no es string
    end
    return text
        :gsub('table: ', '')
        :gsub('function: ', '')
        :gsub('Ugc', 'game')
        :gsub('\n', '')
        :gsub('%s%s+', ';')
        :gsub('""', '')
        :gsub('Data Ping', 'DataPing')
        :gsub('Workspace', 'workspace')
        :gsub('game%.Players', 'Players')
        :gsub('Teleport Service', 'TeleportService')
        :gsub('Run Service', 'RunService')
        :gsub('HttpGetAsync', 'HttpGet')
        :gsub('"', "'")
end

local function tblformat(tbl, depth)
    depth = depth or 0
    if depth > 6 then return "<deep table>" end  -- evita recursión infinita

    if type(tbl) \~= 'table' then
        local str = tostring(tbl)
        return (str == "nil") and "" or '"' .. str .. '"'
    end

    local res = ''
    local first = true
    for i, v in pairs(tbl) do
        if not first then res = res .. ', ' end
        first = false

        local keyStr = (type(i) == 'string' and i:match("^[%w_]+$")) and i or ('[%q]'):format(tostring(i))
        res = res .. keyStr .. ' = ' .. tblformat(v, depth + 1)
    end
    return '{' .. res .. '}'
end

local Track = {}
local kirked = {}
local function kirk(fem, boy)
    return fem .. ';' .. boy
end

local cache = ''
local upvalscache = ''
local formatedcache = ''
local logcount = 1

local function log(upvals, ...)
    upvals = upvals or 'nil'
    upvals = formatlog(tostring(upvals))

    if #upvals > 120 then
        upvals = upvals:sub(1, 80) .. '... (' .. #upvals .. ' chars)'
    end

    local args = {...}
    local formated = formatlog(table.concat(args, " "))
    local logged = formated

    if logged == cache then return end
    if formated == formatedcache and upvals == upvalscache then return end

    local key = logged .. ';' .. upvals
    if kirked[key] then return end
    kirked[key] = true

    -- Mejora: detectar conexiones y async calls
    if upvals:find('Signal') or upvals:find('Connect') then
        logged = formated .. ':Connect(function(...)end)'
    end
    if logged:find('game:HttpGet') or logged:find('HttpGet') then
        logged = 'loadstring(' .. formated .. ')()'
    end

    if logcount > 50000 then
        warn("[Cypher Logger] Límite de logs alcanzado - cerrando")
        game:Shutdown()
        return
    end

    logcount += 1
    cache = logged
    upvalscache = upvals
    formatedcache = formated

    appendfile('logged.txt', logged .. '\n')
end

-- ==============================================
-- HOOKS (mismo que tenías, pero con pequeños fixes de robustez)
-- ==============================================

isfunctionhooked = nil
restorefunction = nil

function GlobalScan()
    for i, v in pairs(_G) do
        log('_G Scan', '_G.' .. tostring(i) .. ' = ' .. tblformat(v))
    end
end

function GenvScan()
    for i, v in pairs(getgenv()) do
        log('getgenv Scan', 'getgenv().' .. tostring(i) .. ' = ' .. tblformat(v))
    end
end

-- setfflag hook
local oldsetfflag = clonefunction(setfflag)
setfflag = newcclosure(function(flag, state)
    local upvals = oldsetfflag(flag, state)
    log(upvals, 'setfflag("' .. flag .. '", "' .. tostring(state) .. '")')
    return upvals
end)

-- request hook
if http and http.request then
    setreadonly(http, false)
    http.request = nil
    setreadonly(http, true)
end

local oldrequest = request
request = newcclosure(function(data)
    local upvals = oldrequest(data)
    local bodyStr = (type(data.Body) == 'string') and ('"' .. data.Body .. '"') or
                    (type(data.Body) == 'table') and ('HttpService:JSONEncode(' .. tblformat(data.Body) .. ')') or
                    tostring(data.Body)

    local headersStr = '{'
    if data.Headers then
        local first = true
        for k, v in pairs(data.Headers) do
            if not first then headersStr = headersStr .. ', ' end
            first = false
            headersStr = headersStr .. '["' .. k .. '"] = "' .. v .. '"'
        end
    end
    headersStr = headersStr .. '}'

    log(upvals, ('request({ Url = "%s", Method = "%s", Body = %s, Headers = %s })'):format(
        data.Url or "nil", data.Method or "nil", bodyStr, headersStr))
    return upvals
end)

-- loadstring hook
local oldloadstring = loadstring
loadstring = function(str)
    if str then
        pcall(function()
            writefile("loadstring_dump_" .. math.random(1000,9999) .. ".lua", str)
        end)
    end
    return oldloadstring(str)
end

-- WebSocket hook
local wss = game:GetService('WebSocketService')
local oldCreateClient = wss.CreateClient
wss.CreateClient = newcclosure(function(self, url)
    if url and not url:lower():find('luarmor') then
        log(nil, 'WebSocketService:CreateClient("' .. url .. '")')
    end
    return oldCreateClient(self, url)
end)

-- Instance.new hook
Instance = Instance or {}
local oldInstanceNew = clonefunction(Instance.new)
setreadonly(Instance, false)
Instance.new = newcclosure(function(name, parent)
    if checkcaller() and not isuilib() then
        local upvals = oldInstanceNew(name, parent)
        local source = debug.getinfo(2, 'S').source or ""
        if source:find('@') then
            log(upvals, 'local temp = Instance.new("' .. name .. '")')
        else
            local varName = tostring(name):gsub("%W+", "_")
            Track[upvals] = varName
            log(upvals, 'local ' .. varName .. ' = Instance.new("' .. name .. '")')
        end
        return upvals
    end
    return oldInstanceNew(name, parent)
end)

-- Metamethods hooks (mismo que tenías, pero con mejor manejo de errores)
local mt = getrawmetatable(game)
local oldIndex = clonefunction(mt.__index)
local oldNamecall = clonefunction(mt.__namecall)
local oldNewindex = clonefunction(mt.__newindex)

hookmetamethod(game, '__index', newcclosure(function(self, key, ...)
    if checkcaller() and not isuilib() then
        local upvals = oldIndex(self, key, ...)
        local formattedArgs = tblformat({...})
        log(upvals, self:GetFullName() .. '.' .. tostring(key) .. ' (' .. formattedArgs .. ')')
        return upvals
    end
    return oldIndex(self, key, ...)
end))

hookmetamethod(game, '__namecall', newcclosure(function(self, ...)
    if checkcaller() and not isuilib() and getnamecallmethod() \~= 'GetFullName' then
        local method = getnamecallmethod()
        local args = {...}
        local formatted = tblformat(args)
        local instanceName = tostring(self)
        log(nil, instanceName .. ':' .. method .. '(' .. formatted .. ')')
        return oldNamecall(self, ...)
    end
    return oldNamecall(self, ...)
end))

hookmetamethod(game, '__newindex', newcclosure(function(self, key, value)
    if checkcaller() and not isuilib() then
        local upvals = oldNewindex(self, key, value)
        local varName = Track[self] or "unknown"
        log(upvals, varName .. '.' .. tostring(key) .. ' = ' .. tostring(value))
        return upvals
    end
    return oldNewindex(self, key, value)
end))

game.DescendantRemoving:Connect(function(obj)
    Track[obj] = nil
end)

-- Print hook
local oldPrint = print
print = newcclosure(function(...)
    if checkcaller() and not isuilib() then
        local args = {...}
        local formatted = table.concat(args, "\t")
        log(nil, 'print("' .. formatted .. '")')
    end
    return oldPrint(...)
end)

print("[Logger] Ejecutando loadstring del usuario...")
print("[Logger] Todas las llamadas API se loguearán en logged.txt")`;

    // ==============================================
    // FUNCIONES FUSIONADAS
    // ==============================================

    function beautify() {
      syncEditors();
      let code = document.getElementById("output").value || document.getElementById("input").value;
      if (!code.trim()) return setStatus("Nada para beautify", "gray");

      let lines = code.split('\n');
      let indent = 0;
      let result = [];

      lines.forEach(line => {
        let trimmed = line.trim();
        if (!trimmed) { result.push(''); return; }

        if (/^end\b|^else\b|^elseif\b|^until\b|^\}|^\)/.test(trimmed)) indent = Math.max(0, indent - 1);

        let indented = '  '.repeat(indent) + trimmed;

        if (/^(local\s+)?function\b|if\b|for\b|while\b|repeat\b|then\b|else\b|elseif\b|do\b|\{$/.test(trimmed) ||
            trimmed.endsWith('do') || trimmed.endsWith('{') || trimmed.endsWith('then')) indent++;

        if (trimmed.startsWith('--[[')) indent++;
        if (trimmed.endsWith(']]')) indent = Math.max(0, indent - 1);

        result.push(indented);
      });

      const beautified = result.join('\n');
      document.getElementById("output").value = beautified;
      updateHighlight("output-highlight", beautified);
      setStatus("Beautify avanzado aplicado ✓", "amber");
    }

    function downloadOutput() {
      syncEditors();
      const content = document.getElementById("output").value.trim();
      if (!content) return setStatus("Nada para descargar", "red");

      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'cypher_deobfuscated.lua';
      a.click();
      URL.revokeObjectURL(url);
      setStatus("Descargado ✓", "emerald");
    }

    function prepareWithEnvLogger() {
      syncEditors();
      const obfuscated = document.getElementById("input").value.trim();
      if (!obfuscated) return setStatus("Pega el script primero", "red");

      const full = ENV_LOGGER + `loadstring([[\n${obfuscated}\n]])()\n`;
      document.getElementById("output").value = full;
      updateHighlight("output-highlight", full);
      setStatus("Logger mejorado preparado ✓ Ejecuta y pega logged.txt", "emerald");
    }

    // ==============================================
    // Advanced Prometheus Undo (de V2)
    // ==============================================
    function advancedPrometheusUndo() {
      syncEditors();
      let code = document.getElementById("output").value || document.getElementById("input").value;
      if (!code.trim()) return setStatus("Nada para procesar", "red");

      // Undo string decrypt PRNG-like (simplificado de V2)
      code = code.replace(/STRINGS\[DECRYPT\(([^)]+)\s*,\s*(\d+)\)\]/g, (_, enc, seed) => {
        let decrypted = enc.replace(/./g, c => String.fromCharCode(c.charCodeAt(0) ^ parseInt(seed)));
        return JSON.stringify(decrypted);
      });

      // Undo constant array inline (placeholder - expandir si tienes array conocido)
      code = code.replace(/CONST\[(\d+)\]/g, (_, idx) => `"CONST_${idx}"`);

      // Proxy locals rewrite (simple pattern match)
      code = code.replace(/local\s+(\w+)\s*=\s*proxy_(\w+)/g, 'local $2 = proxy_$1 -- proxy undone');

      // Join split strings
      code = code.replace(/'([^']*)' \.\. '([^']*)'/g, '"$1$2"');

      document.getElementById("output").value = code;
      updateHighlight("output-highlight", code);
      beautify();
      setStatus("Advanced Prometheus Undo aplicado ✓ (strings, constants, proxies)", "rose");
    }

    // ==============================================
    // Reconstruct from Log (inspirado en Dumper)
    // ==============================================
    function reconstructFromLog() {
      syncEditors();
      let logText = document.getElementById("output").value.trim();
      if (!logText) return setStatus("Pega un log primero", "red");

      // Simple reconstrucción: extraer prints y loadstring del log
      let reconstructed = '-- Reconstruido aproximado desde log\n';
      const lines = logText.split('\n');
      lines.forEach(line => {
        if (line.includes('print(')) {
          const match = line.match(/print\("([^"]+)"\)/);
          if (match) reconstructed += `print("${match[1]}")\n`;
        }
        if (line.includes('LOADSTRING')) {
          reconstructed += '-- Loadstring detectado en log\n';
        }
      });

      reconstructed += '\n-- Agrega más lógica manualmente o usa Grok para reconstruir completo';
      document.getElementById("output").value = reconstructed;
      updateHighlight("output-highlight", reconstructed);
      setStatus("Reconstrucción básica desde log ✓", "cyan");
    }

    function detectType() {
      syncEditors();
      const code = document.getElementById("input").value.trim();
      if (!code) return setStatus("Nada para detectar", "gray");
      let type = "Desconocido";
      if (/WeAreDevs|Prometheus|PHASE_BOUNDARY/i.test(code)) type = "Prometheus / WeAreDevs";
      else if (/LuaObfuscator|string\.char|table\.unpack/i.test(code)) type = "LuaObfuscator";
      setStatus(`Detectado: ${type}`, "violet");
    }

    function deobfLuaObfuscator() {
      syncEditors();
      let code = document.getElementById("input").value;
      if (!code) return setStatus("Nada para procesar", "red");

      code = code.replace(/string\.char\s*\(\s*table\.unpack\s*\(\s*\{([\d\s,]+)\}\s*\)\s*\)/g, (_, n) => JSON.stringify(String.fromCharCode(...n.split(',').map(Number))));
      code = code.replace(/string\.char\s*\(\s*(\d+(?:,\s*\d+)*)\s*\)/g, (_, n) => JSON.stringify(String.fromCharCode(...n.split(',').map(Number))));

      document.getElementById("output").value = code;
      updateHighlight("output-highlight", code);
      beautify();
      setStatus("LuaObfuscator strings desencriptadas ✓", "blue");
    }

    function deobfPrometheus() {
      syncEditors();
      let code = document.getElementById("input").value;
      if (!code) return setStatus("Nada para procesar", "red");

      code = code.replace(/--\s*PHASE_BOUNDARY[^\n]*\n?/g, '');
      code = code.replace(/if\s+(getfenv|debug\.getinfo|synapse|krnl|identifyexecutor)[^\n]*\n?/g, '-- [ANTI-DEBUG REMOVIDO]\n');

      document.getElementById("output").value = code;
      updateHighlight("output-highlight", code);
      beautify();
      setStatus("Prometheus/WeAreDevs limpieza básica ✓", "rose");
    }

    function deobfAll() {
      syncEditors();
      const code = document.getElementById("input").value.trim();
      if (!code) return setStatus("Ingresa código primero", "red");

      if (/LuaObfuscator|string\.char|table\.unpack/.test(code)) deobfLuaObfuscator();
      else deobfPrometheus();

      beautify();
      setStatus("Deobf automático completado 🔥", "violet");
    }

    function copyOutput() {
      syncEditors();
      const out = document.getElementById("output").value.trim();
      if (!out) return setStatus("Nada para copiar", "gray");

      navigator.clipboard.writeText(out)
        .then(() => setStatus("Copiado al portapapeles ✓", "emerald"))
        .catch(() => setStatus("Error al copiar", "red"));
    }

    function sendToGrok() {
      syncEditors();
      let text = document.getElementById("output").value.trim();
      if (!text) return setStatus("No hay contenido", "red");

      const isLog = text.includes(' = ') && (text.includes('Instance.new') || text.includes('game:GetService'));
      let prompt = isLog 
        ? `ENV LOG de Cypher Logger. Reconstruye script limpio, renombra vars lógicas, organiza, comenta.\n\nLog:\n\`\`\`lua\n${text}\n\`\`\``
        : `Deobfusca script Lua pre-procesado. Renombra, quita junk, arregla flujo.\n\nCódigo:\n\`\`\`lua\n${text}\n\`\`\``;

      navigator.clipboard.writeText(prompt)
        .then(() => {
          setStatus("Prompt copiado ✓ Pégalo en grok.x.ai", "emerald");
          window.open("https://grok.x.ai", '_blank');
        })
        .catch(() => setStatus("Error al copiar", "red"));
    }

    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("output").value = "";
      updateHighlight("input-highlight", "");
      updateHighlight("output-highlight", "");
      setStatus("Todo limpio", "gray");
    }

    // Drag & Drop
    const dropzone = document.getElementById('input-dropzone');
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => {
          document.getElementById('input').value = ev.target.result;
          updateHighlight('input-highlight', ev.target.result);
          setStatus(`Arrastrado: ${file.name} ✓`, "violet");
        };
        reader.readAsText(file);
      }
    });

    // Inicial
    updateHighlight("input-highlight", "");
    updateHighlight("output-highlight", "");
  </script>
</body>
</html>
