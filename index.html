<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cypher WebHook Tool</title>

<style>

body{
background:#07060c;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#0f0c18;
border:1px solid #7a42ff;
padding:30px;
width:420px;
border-radius:12px;
box-shadow:0 0 25px #5e2eff;
}

h1{
text-align:center;
color:#cba6ff;
margin-bottom:25px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
background:#0a0913;
border:1px solid #5a2ad9;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
background:#7a42ff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#9a6dff;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.log{
margin-top:15px;
background:#05040a;
padding:10px;
height:120px;
overflow:auto;
font-size:13px;
border:1px solid #4a2aa6;
}

</style>
</head>

<body>

<div class="container">

<h1>Cypher WebHook Tool</h1>

<input id="webhook" placeholder="Webhook URL">

<textarea id="message" placeholder="Message"></textarea>

<input id="name" placeholder="New Name">

<div class="row">

<button onclick="sendMessage()">Send</button>
<button onclick="spam()">Spam</button>

<button onclick="deleteWebhook()">Delete</button>
<button onclick="changeName()">Change Name</button>

<button onclick="check()">Check Status</button>
<button onclick="stopSpam()">Stop Spam</button>

</div>

<div class="log" id="log"></div>

</div>

<script>

let spamInterval = null

function log(t){
document.getElementById("log").innerHTML += t+"<br>"
}

async function sendMessage(){

const w = document.getElementById("webhook").value
const m = document.getElementById("message").value

let r = await fetch(w,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content:m})
})

if(r.status==204) log("Message sent")

}

function spam(){

const w = document.getElementById("webhook").value
const m = document.getElementById("message").value

spamInterval = setInterval(async()=>{

let r = await fetch(w,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content:m})
})

if(r.status==204) log("Spam message sent")

},800)

}

function stopSpam(){
clearInterval(spamInterval)
log("Spam stopped")
}

async function deleteWebhook(){

const w = document.getElementById("webhook").value

let r = await fetch(w,{method:"DELETE"})

if(r.status==204) log("Webhook deleted")

}

async function changeName(){

const w = document.getElementById("webhook").value
const n = document.getElementById("name").value

let r = await fetch(w,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:n})
})

if(r.status==200) log("Name changed")

}

async function check(){

const w = document.getElementById("webhook").value

let r = await fetch(w)

if(r.status==200) log("Webhook active")
else if(r.status==404) log("Webhook not found")
else log("Error "+r.status)

}

</script>

</body>
</html>
