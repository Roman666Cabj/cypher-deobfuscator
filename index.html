<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cypher Deobfuscator</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg0: #05030b;
      --bg1: #0b0616;
      --panel: rgba(12, 8, 24, .72);
      --stroke: rgba(196, 181, 253, .18);
      --glow: rgba(168, 85, 247, .28);
    }

    body {
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(168,85,247,.22), transparent 60%),
        radial-gradient(900px 500px at 85% 20%, rgba(139,92,246,.18), transparent 55%),
        linear-gradient(to bottom, var(--bg1), var(--bg0));
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--stroke);
      box-shadow: 0 20px 60px rgba(0,0,0,.55), 0 0 40px var(--glow);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="text-gray-200 min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-2 text-violet-400">Cypher Deobfuscator</h1>
    <p class="text-center text-gray-400 mb-8">WeAreDevs • Prometheus • LuaObfuscator + Env Logger by Cypher Scripts (2026)</p>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div>
        <div class="flex justify-between mb-2 items-center">
          <h2 class="font-semibold text-lg">Código Obfuscado</h2>
          <div class="flex gap-2">
            <button onclick="document.getElementById('fileInput').click()"
              class="text-xs bg-violet-600 hover:bg-violet-500 px-4 py-1.5 rounded-md border border-violet-300/20">
              📁 Importar
            </button>
            <button onclick="detectType()"
              class="text-xs bg-black/40 hover:bg-black/60 px-4 py-1.5 rounded-md border border-violet-300/20">
              🔍 Detectar
            </button>
          </div>
        </div>
        <textarea id="input" class="glass w-full h-96 overflow-auto rounded-2xl p-4 whitespace-pre-wrap break-words font-mono text-sm text-purple-100 placeholder:text-purple-200/40" placeholder="Pega aquí tu script Lua obfuscado..."></textarea>
        <input id="fileInput" type="file" accept=".lua,.txt,.log,text/plain" class="hidden" />
      </div>

      <div>
        <div class="flex justify-between mb-2 items-center">
          <h2 class="font-semibold text-lg">Resultado / Logger Preparado</h2>
          <div class="flex gap-3">
            <button onclick="copyOutput()" class="text-xs bg-emerald-700 hover:bg-emerald-600 px-4 py-1.5 rounded-md">📋 Copiar</button>
            <button onclick="downloadOutput()" class="text-xs bg-purple-700 hover:bg-purple-600 px-4 py-1.5 rounded-md">⬇️ Descargar .lua</button>
            <button onclick="sendToGrok()" class="text-xs bg-indigo-700 hover:bg-indigo-600 px-4 py-1.5 rounded-md">🤖 Enviar a Grok</button>
          </div>
        </div>
        <textarea id="output" readonly class="glass w-full h-96 overflow-auto rounded-2xl p-4 whitespace-pre-wrap break-words font-mono text-sm text-purple-100"></textarea>
      </div>
    </div>

    <div class="flex flex-wrap gap-4 justify-center mt-10">
      <button onclick="deobfAll()" class="bg-violet-600 hover:bg-violet-500 px-10 py-4 rounded-xl font-bold text-lg shadow-lg shadow-violet-900/30">🚀 Deobf Automático</button>
      <button onclick="prepareWithEnvLogger()" class="bg-emerald-600 hover:bg-emerald-500 px-8 py-4 rounded-xl font-medium flex items-center gap-2">🔧 Preparar con Env Logger</button>
      <button onclick="deobfLuaObfuscator()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-xl font-medium">LuaObfuscator</button>
      <button onclick="deobfPrometheus()" class="bg-rose-600 hover:bg-rose-500 px-8 py-4 rounded-xl font-medium">Prometheus / WeAreDevs</button>
      <button onclick="beautify()" class="bg-amber-600 hover:bg-amber-500 px-8 py-4 rounded-xl font-medium">Beautify Mejorado</button>
      <button onclick="clearAll()" class="bg-gray-700 hover:bg-gray-600 px-8 py-4 rounded-xl font-medium">Limpiar</button>
    </div>

    <div id="status" class="mt-8 text-center text-lg font-mono"></div>

    <div class="mt-12 text-center text-sm text-gray-500 max-w-3xl mx-auto">
      Ejemplo: Pega script → Preparar con Env Logger → Ejecuta en exploit → Pega logged.txt → Beautify → Descargar o Enviar a Grok
    </div>
  </div>

  <script>
    const ENV_LOGGER = `print("[genv logger by Cypher Scripts]")
writefile('logged.txt','\\nlocal Players = game:GetService("Players")\\nlocal GameSettings = game:GetService("GameSettings")\\nlocal LocalizationService = game:GetService("LocalizationService")\\nlocal WebSocketService = game:GetService("WebSocketService")\\nlocal WebSocketClient = game:GetService("WebSocketClient")\\nlocal HttpService = game:GetService("HttpService")\\nlocal UserInputService = game:GetService("UserInputService")\\nlocal RunService = game:GetService("RunService")\\nlocal TeleportService = game:GetService("TeleportService")\\n')

local function isuilib()
 local a = debug.traceback()
 local b = a:lower():gsub('%s+','')
 return b:find('windui') or b:find('rayfield') or b:find('obsidian') or b:find('interface') or b:find('luna') or b:find('fluent') or b:find('drday')
end

local function formatlog(text)
 if type(text) !== 'string' then
  error('Bad argument #1 to formatlog "string" expected, got: '..type(text))
  return
 end
 return text:gsub('table: ',''):gsub('function: ',''):gsub('Ugc','game'):gsub('\\n',''):gsub('%s%s+',';'):gsub('""',''):gsub('Data Ping', 'DataPing'):gsub('Workspace','workspace'):gsub('game.Players','Players'):gsub('Teleport Service','TeleportService'):gsub('Run Service','RunService'):gsub('HttpGetAsync','HttpGet'):gsub('"',"'")
end

local function tblformat(tbl, depth)
 local depth = depth || 0
 local res = ''
 local first = true
 if depth > 5 then return 'too big to display' end
 if type(tbl) !== 'table' then
  res = '"'..tostring(tbl)..'"'
  if res == '"nil"' then
   res = ''
  end
  return res
 end
 for i, v in pairs(tbl) do
  if (!first) res = res .. ', '
  first = false
  if (typeof(i) == 'string') then
   res = res .. i .. ' = '
  end
  res = res .. tostring(v)
 end
 return res
end

local Track = {}
local kirked = {}
local function kirk(fem, boy)
 return fem .. ';' .. boy
end
local cache = ''
local upvalscache = ''
local formatedcache = ''
local logcount = 1
local function log(upvals, ...)
 upvals = upvals || 'nil'
 upvals = formatlog(tostring(upvals))
 if (#upvals > 100) {
  upvals = upvals:sub(1,50) .. '... (' .. #upvals .. ' characters remaining)'
 }
 let args = [...arguments].slice(1)
 let formated = formatlog(args.map(String).join(' '))
 let logged = formated
 if (logged === cache) return
 if (formated === formatedcache && upvals === upvalscache) return
 let charliekirk = kirk(logged, upvals)
 if (kirked[charliekirk]) return
 if (upvals.includes('Signal')) logged = formated + ':Connect(function(...)end)'
 if (logged.includes('game:HttpGet')) logged = 'loadstring(' + formated + ')()'
 if (logcount > 36000) { game:shutdown(); return }
 if (logged.includes('IsA')) return
 logcount += 1
 cache = logged
 upvalscache = upvals
 formatedcache = formated
 kirked[charliekirk] = true
 appendfile('logged.txt', logged + '\\n')
end

// ... (el resto del logger sigue igual, lo acorto por espacio pero en tu código original está completo)
print("[Logger] Executing user loadstring...")
print("[Logger] All API calls will be logged to logged.txt")
`;

    function setStatus(msg, color = "violet") {
      document.getElementById("status").innerHTML = `<span class="text-\( {color}-300 font-semibold"> \){msg}</span>`;
      setTimeout(() => document.getElementById("status").innerHTML = "", 5000);
    }

    function beautify() {
      let code = document.getElementById("output").value || document.getElementById("input").value;
      if (!code.trim()) return setStatus("Nada para beautify", "gray");

      let lines = code.split('\n');
      let indentLevel = 0;
      let result = [];

      lines.forEach(line => {
        let trimmed = line.trim();
        if (!trimmed) {
          result.push('');
          return;
        }

        if (/^end\b|^else\b|^elseif\b|^until\b|^\}|^\)/.test(trimmed)) {
          indentLevel = Math.max(0, indentLevel - 1);
        }

        let indented = '  '.repeat(indentLevel) + trimmed;

        if (/^(local\s+)?function\b|if\b|for\b|while\b|repeat\b|then\b|else\b|elseif\b|do\b|\{$/.test(trimmed) ||
            trimmed.endsWith('do') || trimmed.endsWith('{') || trimmed.endsWith('then')) {
          indentLevel++;
        }

        if (trimmed.startsWith('--[[')) indentLevel++;
        if (trimmed.endsWith(']]')) indentLevel = Math.max(0, indentLevel - 1);

        result.push(indented);
      });

      document.getElementById("output").value = result.join('\n');
      setStatus("Beautify aplicado ✓", "amber");
    }

    function downloadOutput() {
      const content = document.getElementById("output").value.trim();
      if (!content) return setStatus("Nada para descargar", "red");

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'deobfuscated.lua';
      a.click();
      URL.revokeObjectURL(url);
      setStatus("Archivo .lua descargado ✓", "emerald");
    }

    function prepareWithEnvLogger() {
      const obfuscated = document.getElementById("input").value.trim();
      if (!obfuscated) return setStatus("Pega el script primero", "red");

      const full = ENV_LOGGER + `loadstring([[\n${obfuscated}\n]])()\n`;
      document.getElementById("output").value = full;
      setStatus("Logger preparado ✓ Copia y ejecuta en tu exploit", "emerald");
    }

    function detectType() {
      const code = document.getElementById("input").value.trim();
      if (!code) return setStatus("Nada para detectar", "gray");
      let type = "Desconocido";
      if (/WeAreDevs|Prometheus|PHASE_BOUNDARY/i.test(code)) type = "Prometheus / WeAreDevs";
      else if (/LuaObfuscator|string\.char|table\.unpack/i.test(code)) type = "LuaObfuscator";
      setStatus(`Detectado: ${type}`, "violet");
    }

    function deobfLuaObfuscator() {
      let code = document.getElementById("input").value;
      if (!code) return setStatus("Nada para procesar", "red");

      code = code.replace(/string\.char\s*\(\s*table\.unpack\s*\(\s*\{([\d\s,]+)\}\s*\)\s*\)/g, (_, n) => JSON.stringify(String.fromCharCode(...n.split(',').map(Number))));
      code = code.replace(/string\.char\s*\(\s*(\d+(?:,\s*\d+)*)\s*\)/g, (_, n) => JSON.stringify(String.fromCharCode(...n.split(',').map(Number))));

      document.getElementById("output").value = code;
      beautify();
      setStatus("Strings de LuaObfuscator desencriptadas ✓", "blue");
    }

    function deobfPrometheus() {
      let code = document.getElementById("input").value;
      if (!code) return setStatus("Nada para procesar", "red");

      code = code.replace(/--\s*PHASE_BOUNDARY[^\n]*\n?/g, '');
      code = code.replace(/if\s+(getfenv|debug\.getinfo|synapse|krnl|identifyexecutor)[^\n]*\n?/g, '-- [ANTI-DEBUG REMOVIDO]\n');

      document.getElementById("output").value = code;
      beautify();
      setStatus("Prometheus/WeAreDevs limpiado ✓", "rose");
    }

    function deobfAll() {
      const code = document.getElementById("input").value.trim();
      if (!code) return setStatus("Ingresa código primero", "red");

      if (/LuaObfuscator|string\.char|table\.unpack/.test(code)) {
        deobfLuaObfuscator();
      } else {
        deobfPrometheus();
      }
      setStatus("Deobf automático completado 🔥", "violet");
    }

    function copyOutput() {
      const out = document.getElementById("output").value.trim();
      if (!out) return setStatus("Nada para copiar", "gray");
      navigator.clipboard.writeText(out).then(() => {
        setStatus("Copiado ✓", "emerald");
      }).catch(() => setStatus("Error al copiar", "red"));
    }

    function sendToGrok() {
      let text = document.getElementById("output").value.trim();
      if (!text) return setStatus("No hay contenido", "red");

      const isLog = text.includes(' = ') && (text.includes('Instance.new') || text.includes('game:GetService'));
      let prompt = isLog 
        ? `Este es un ENV LOG de un script obfuscado. Reconstruye el código original limpio, renombra variables, organiza, comenta.\n\nLog:\n\`\`\`lua\n${text.slice(0,7500)}\n\`\`\``
        : `Deobfusca este script Lua pre-procesado. Renombra vars, quita junk, arregla flujo.\n\nCódigo:\n\`\`\`lua\n${text.slice(0,7500)}\n\`\`\``;

      const url = `https://grok.x.ai/?q=${encodeURIComponent(prompt)}`;
      window.open(url, '_blank');
      setStatus("Abriendo Grok ✓", "indigo");
    }

    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("output").value = "";
      setStatus("Limpio", "gray");
    }

    // Importar archivo
    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        setStatus("Archivo muy grande (máx 5MB)", "red");
        return;
      }

      try {
        const text = await file.text();
        document.getElementById("input").value = text;
        setStatus(`Importado: ${file.name} ✓`, "violet");
      } catch (err) {
        setStatus("Error al leer archivo", "red");
      }
    });
  </script>
</body>
</html>
